<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sports Captain</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
  
  <div class="container">

    <!-- Header -->

    <div class="header">

        <div class="schoolBox">

            <img src="Images/logo.jpg" class="logo">

            <div>
<h2>
MSG HI-TECH GURUKUL<br>
GIRLS' SCHOOL, BUDNI
</h2>
</div>

        </div>

        <div class="electionTag">

            STUDENT COUNCIL ELECTION 2026

        </div>

    </div>

    <!-- Title -->

    <div class="title">

        <h1>SPORTS CAPTAIN</h1>

        <p>⭐ CHOOSE YOUR LEADER ⭐</p>

    </div>

    <!-- Candidate 1 -->

<div class="card">

    <div class="photo">
        <img src="Images/mahi_sports.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>MAHI JAT</h2>
        <p>🏅 Active</p>
    </div>

    <button class="voteBtn" onclick="voteSportsCaptain('Mahi Jat')">
        VOTE
    </button>

</div>

    <!-- Candidate 2 -->

<div class="card">

    <div class="photo">
        <img src="Images/ananya.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>
          ANANYA<br>
        JAT
        </h2>
        <p>⚡ Energetic</p>
    </div>

    <button class="voteBtn" onclick="voteSportsCaptain('Ananya Jat')">
        VOTE
    </button>

</div>

    <!-- Candidate 3 -->

    <div class="card">

    <div class="photo">
        <img src="Images/priyani_chouhan.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>PRIYANI<br>CHOUHAN</h2>
        <p>⭐ Dedicated</p>
    </div>

    <button class="voteBtn" onclick="voteSportsCaptain('Priyani Chouhan')">
        VOTE
    </button>

</div>
    </div>

    <div class="footer">
    <span class="check">✓</span>
    Your Vote is Important. Choose Wisely!
</div>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
