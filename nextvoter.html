<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Voter</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#F8F5EF;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
width:90%;
max-width:450px;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.2);
}

.tick{
font-size:80px;
}

h1{
color:#2E7D32;
}

p{
font-size:20px;
margin:20px 0;
}

button{
background:#1565C0;
color:white;
border:none;
padding:15px 35px;
font-size:20px;
border-radius:10px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<div class="tick">✅</div>

<h1>Vote Completed</h1>

<p>Please call the next voter.</p>

<button onclick="nextVoter()">
START NEXT VOTER
</button>

</div>

<script>

function nextVoter(){

localStorage.clear();

window.location.href="index.html";

}

</script>

</body>
</html>
