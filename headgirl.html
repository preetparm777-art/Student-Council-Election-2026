<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Head Girl</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
  
  <div class="container">

    <!-- Header -->

    <div class="header">

        <div class="schoolBox">

            <img src="Images/logo.jpg" class="logo">

            <div>
<h2>
MSG HI-TECH GURUKUL<br>
GIRLS' SCHOOL, BUDNI
</h2>
</div>

        </div>

        <div class="electionTag">

            STUDENT COUNCIL ELECTION 2026

        </div>

    </div>

    <!-- Title -->

    <div class="title">

        <h1>HEAD GIRL</h1>

        <p>⭐ CHOOSE YOUR LEADER ⭐</p>

    </div>

    <!-- Candidate 1 -->

<div class="card">

    <div class="photo">
        <img src="Images/shraddha.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>
          SHRADDHA<br>
          MEENA
          </h2>
        <p>⭐ Inspiring</p>
    </div>


    <button class="voteBtn" onclick="voteHeadGirl('Shraddha Meena')">
    VOTE
</button>

</div>

    <!-- Candidate 2 -->

<div class="card">

    <div class="photo">
        <img src="Images/shreya.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>
          SHREYA<br>
          RAGHUWANSHI
          </h2>
        <p>💫 Confident</p>
    </div>

   <button class="voteBtn" onclick="voteHeadGirl('Shreya Raghuwanshi')">
        VOTE
    </button>

</div>

    <!-- Candidate 3 -->

  <div class="card">

    <div class="photo">
        <img src="Images/aditi.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>ADITI<br>
        CHOUHAN
        </h2>
        <p>⚡ Dedicated</p>
    </div>

    <button class="voteBtn" onclick="voteHeadGirl('Aditi Chouhan')">
        VOTE
    </button>

</div>

    <div class="footer">
    <span class="check">✓</span>
    Your Vote is Important. Choose Wisely!
</div>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
