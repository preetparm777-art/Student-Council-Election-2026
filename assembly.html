<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assembly Captain </title>

<link rel="stylesheet" href="style.css">

</head>

<body>
  
  <div class="container">

    <!-- Header -->

    <div class="header">

        <div class="schoolBox">

            <img src="Images/logo.jpg" class="logo">

            <div>
<h2>
MSG HI-TECH GURUKUL<br>
GIRLS' SCHOOL, BUDNI
</h2>
</div>

        </div>

        <div class="electionTag">

            STUDENT COUNCIL ELECTION 2026

        </div>

    </div>

    <!-- Title -->

    <div class="title">

        <h1>ASSEMBLY CAPTAIN</h1>

        <p>⭐ CHOOSE YOUR LEADER ⭐</p>

    </div>

    <!-- Candidate 1 -->

<div class="card">

    <div class="photo">
        <img src="Images/sakshi.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>
            SAKSHI<br>
            GOUR
        </h2>
        <p>⭐ Creative</p>
    </div>

    <button class="voteBtn" onclick="voteAssemblyCaptain('Sakshi Gour')">
        VOTE
    </button>

</div>

    <!-- Candidate 2 -->

<div class="card">

    <div class="photo">
        <img src="Images/suhani.jpg" class="candidate">
    </div>

    <div class="info">
        <h2>
            SUHANI<br>
            GUPTA
        </h2>
        <p>💫 Talented</p>
    </div>

    <button class="voteBtn" onclick="voteAssemblyCaptain('Suhani Gupta')">
        VOTE
    </button>

</div>

    <div class="footer">
    <span class="check">✓</span>
    Your Vote is Important. Choose Wisely!
</div>

</div>

<script type="module" src="script.js"></script>

</body>

</html>
