<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#F8F5EF;
}

.header{
background:#2E7D32;
padding:20px;
text-align:center;
color:white;
}

.logo{
width:90px;
}

.school{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

.title{
text-align:center;
font-size:34px;
color:#8B6B00;
margin:30px;
font-weight:bold;
}

.box{
width:90%;
margin:auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 4px 12px rgba(0,0,0,.2);
}

.item{
display:flex;
justify-content:space-between;
padding:15px;
font-size:22px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="header">

<img src="Images/logo.jpg" class="logo">

<div class="school">
MSG HI-TECH GURUKUL GIRLS' SCHOOL, BUDNI
</div>

</div>

<div class="title">
ELECTION RESULTS
</div>

<div class="box">

<div class="item">
<span>Head Girl</span>
<span id="headgirl">0</span>
</div>

<div class="item">
<span>Vice Head Girl</span>
<span id="viceheadgirl">0</span>
</div>

<div class="item">
<span>CCA Captain</span>
<span id="cca">0</span>
</div>

<div class="item">
<span>Vice CCA Captain</span>
<span id="vicecca">0</span>
</div>

<div class="item">
<span>Sports Captain</span>
<span id="sports">0</span>
</div>

<div class="item">
<span>Assembly Captain</span>
<span id="assembly">0</span>
</div>

<div class="item">
<span>Transport Captain</span>
<span id="transport">0</span>
</div>

</div>

</body>
</html>
